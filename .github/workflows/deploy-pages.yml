name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install extension dependencies
        run: npm ci
        working-directory: vscode-extension

      - name: Build extension host
        run: node esbuild.mjs
        working-directory: vscode-extension

      - name: Install webview dependencies
        run: npm ci
        working-directory: vscode-extension/webview

      - name: Build webview
        run: npx vite build
        working-directory: vscode-extension/webview

      - name: Package VS Code extension
        run: npx @vscode/vsce package --allow-missing-repository
        working-directory: vscode-extension

      - name: Copy .vsix to dist with stable name
        run: cp vscode-extension/*.vsix dist/md-reader-latest.vsix

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
