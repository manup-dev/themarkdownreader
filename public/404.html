<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>md-reader</title>
  <script>
    // SPA redirect for GitHub Pages
    // Redirects all 404s to index.html with the original path as a query param
    var base = '/themarkdownreader/';
    var path = window.location.pathname.replace(base, '') + window.location.search + window.location.hash;
    window.location.replace(base + '?p=' + encodeURIComponent(path));
  </script>
</head>
<body></body>
</html>
