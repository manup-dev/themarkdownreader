<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="The first markdown tool built for reading, not writing. AI chat, mind maps, knowledge graphs, TTS — all in your browser, no API keys needed." />
    <meta property="og:title" content="md-reader — AI Markdown Reader" />
    <meta property="og:description" content="Drop any markdown file. Get AI chat, mind maps, knowledge graphs, and text-to-speech — all running locally, no signup." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.svg" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="md-reader — AI Markdown Reader" />
    <meta name="twitter:description" content="The first markdown tool built for reading, not writing. AI-powered, local-first, open source." />
    <title>md-reader — AI Markdown Reader</title>
    <script>
      // Prevent FOUC: apply saved theme before first paint
      (function() {
        try {
          var t = localStorage.getItem('md-reader-theme');
          var cl = document.documentElement.classList;
          if (t === 'dark' || t === 'high-contrast') cl.add('dark');
          if (t === 'sepia') cl.add('sepia');
          if (t === 'high-contrast') cl.add('high-contrast');
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
